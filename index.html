<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学业水平考试考务音频播报系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        :root {
            --primary: #165DFF;
            --primary-dark: #0E42C7;
            --success: #00B42A;
            --danger: #F53F3F;
            --warning: #FF7D00;
            --bg: #F5F7FA;
            --card: #FFFFFF;
            --text: #1D2129;
            --text-secondary: #4E5969;
            --text-tertiary: #86909C;
            --border: #E5E6EB;
            --radius: 10px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 顶部标题时间栏 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 28px 32px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title p {
            font-size: 14px;
            opacity: 0.85;
        }

        .header-time {
            text-align: right;
        }

        .time-date {
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .time-clock {
            font-size: 42px;
            font-weight: 700;
            font-family: "Consolas", "Courier New", monospace;
            letter-spacing: 2px;
        }

        /* 主内容网格 */
        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
        }

        .card-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        .card-title i {
            color: var(--primary);
            font-size: 18px;
        }

        /* 按钮组 */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .btn {
            padding: 11px 12px;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 500;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(22, 93, 255, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            background: #009A29;
            box-shadow: 0 4px 8px rgba(0, 180, 42, 0.2);
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: #D92D20;
            box-shadow: 0 4px 8px rgba(245, 63, 63, 0.2);
        }

        .btn-secondary {
            background: #F2F3F5;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #E5E6EB;
            box-shadow: none;
        }

        .btn.playing {
            background: var(--warning);
            box-shadow: 0 0 0 3px rgba(255, 125, 0, 0.15);
        }

        /* 音量控制 */
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: 6px;
            margin-top: 8px;
        }

        .volume-wrap span {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .volume-wrap input[type="range"] {
            flex: 1;
            accent-color: var(--primary);
        }

        .volume-value {
            min-width: 40px;
            text-align: right;
            font-weight: 600;
            color: var(--primary);
        }

        /* 定时模块 */
        .timer-section {
            background: var(--bg);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .timer-section h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--text);
            font-weight: 600;
        }

        .timer-input-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .timer-input-row input,
        .timer-input-row select {
            flex: 1;
            min-width: 90px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 13px;
            background: white;
        }

        .timer-input-row .btn {
            flex: 0 0 auto;
            padding: 8px 14px;
            font-size: 13px;
        }

        /* 倒计时显示 */
        .countdown-display {
            text-align: center;
            padding: 16px;
            background: linear-gradient(135deg, #E8F3FF 0%, #D6E8FF 100%);
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .countdown-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .countdown-time {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-dark);
            font-family: "Consolas", monospace;
        }

        /* 任务列表 */
        .task-list {
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--bg);
            border-radius: 5px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .task-info .task-time {
            font-weight: 600;
            color: var(--success);
            margin-bottom: 2px;
        }

        .task-info .task-name {
            color: var(--text-secondary);
        }

        .task-del {
            color: var(--danger);
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .task-del:hover {
            background: rgba(245, 63, 63, 0.1);
        }

        .empty-tip {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 13px;
            padding: 20px 0;
        }

        /* 状态面板 */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .status-item {
            padding: 14px;
            background: var(--bg);
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .status-item.success {
            border-left-color: var(--success);
        }

        .status-item.danger {
            border-left-color: var(--danger);
        }

        .status-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-dot.off {
            background: var(--danger);
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* 日志 */
        .log-box {
            height: 260px;
            overflow-y: auto;
            background: var(--bg);
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            padding: 3px 0;
            border-bottom: 1px solid #EAECEF;
        }

        .log-time {
            color: var(--primary);
            font-weight: 600;
            margin-right: 8px;
            font-family: "Consolas", monospace;
        }

        /* 底部 */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-tertiary);
            font-size: 12px;
            padding: 12px;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #F2F3F5;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: #C9CDD4;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #86909C;
        }

        /* 响应式 */
        @media (max-width: 1100px) {
            .main-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .main-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                text-align: center;
            }

            .header-time {
                text-align: center;
                width: 100%;
            }

            .time-clock {
                font-size: 32px;
            }

            .btn-group {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 顶部头部 -->
        <div class="header">
            <div class="header-title">
                <h1><i class="fas fa-bullhorn"></i> 学业水平考试考务音频播报系统</h1>
                <p>标准化考场音频指令播报 · 定时自动执行 · 息屏不间断</p>
            </div>
            <div class="header-time">
                <div class="time-date" id="dateText">2026年6月27日 星期六</div>
                <div class="time-clock" id="timeText">14:30:00</div>
            </div>
        </div>

        <!-- 主体三栏 -->
        <div class="main-grid">
            <!-- 第一栏：播报控制 -->
            <div class="card">
                <div class="card-title"><i class="fas fa-play-circle"></i> 音频播报控制</div>

                <div class="btn-group">
                    <button class="btn" data-audio="entranceMusic"><i class="fas fa-music"></i> 入场音乐</button>
                    <button class="btn" data-audio="entranceInstruction"><i class="fas fa-door-open"></i> 进入考场</button>
                    <button class="btn" data-audio="examRules"><i class="fas fa-clipboard-list"></i> 考生守则</button>
                </div>

                <div class="btn-group">
                    <button class="btn" data-audio="openAnswerSheet"><i class="fas fa-folder-open"></i> 启封答题卡</button>
                    <button class="btn" data-audio="openExamPaper"><i class="fas fa-file-alt"></i> 启封试卷袋</button>
                    <button class="btn" data-audio="distributePapers"><i class="fas fa-copy"></i> 发放试卷</button>
                </div>

                <div class="btn-group">
                    <button class="btn btn-success" data-audio="examStart"><i class="fas fa-hourglass-start"></i>
                        考试开始</button>
                    <button class="btn" data-audio="countdown15"><i class="fas fa-clock"></i> 15分钟提醒</button>
                    <button class="btn btn-danger" data-audio="examEnd"><i class="fas fa-flag-checkered"></i>
                        考试结束</button>
                </div>

                <div class="btn-group">
                    <button class="btn" data-audio="postExamInstruction"><i class="fas fa-info-circle"></i>
                        考后指令</button>
                    <button class="btn btn-secondary" id="stopBtn"><i class="fas fa-stop"></i> 停止播报</button>
                    <button class="btn btn-secondary" id="saveBtn"><i class="fas fa-save"></i> 保存设置</button>
                </div>

                <div class="volume-wrap">
                    <span><i class="fas fa-volume-up"></i> 播报音量</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="80">
                    <span class="volume-value" id="volumeText">80%</span>
                </div>
            </div>

            <!-- 第二栏：定时系统 -->
            <div class="card">
                <div class="card-title"><i class="fas fa-clock"></i> 定时播报系统</div>

                <div class="countdown-display">
                    <div class="countdown-label">下次播报倒计时</div>
                    <div class="countdown-time" id="countdownShow">暂无定时任务</div>
                </div>

                <div class="timer-section">
                    <h4>北京时间定时</h4>
                    <div class="timer-input-row">
                        <input type="date" id="dateInput">
                        <input type="time" id="timeInput" value="09:00">
                    </div>
                    <div class="timer-input-row">
                        <select id="audioSelect1">
                            <option value="entranceMusic">入场音乐</option>
                            <option value="entranceInstruction">进入考场指令</option>
                            <option value="examRules">考生守则</option>
                            <option value="openAnswerSheet">启封答题卡</option>
                            <option value="openExamPaper">启封试卷袋</option>
                            <option value="distributePapers">发放试卷</option>
                            <option value="examStart">考试开始</option>
                            <option value="countdown15">15分钟提醒</option>
                            <option value="examEnd">考试结束</option>
                            <option value="postExamInstruction">考后指令</option>
                        </select>
                        <button class="btn btn-success" id="addTimeBtn">添加定时</button>
                    </div>
                </div>

                <div class="timer-section">
                    <h4>倒计时定时</h4>
                    <div class="timer-input-row">
                        <input type="number" id="minInput" min="1" max="120" value="15" placeholder="分钟">
                        <select id="audioSelect2">
                            <option value="entranceMusic">入场音乐</option>
                            <option value="entranceInstruction">进入考场指令</option>
                            <option value="examRules">考生守则</option>
                            <option value="openAnswerSheet">启封答题卡</option>
                            <option value="openExamPaper">启封试卷袋</option>
                            <option value="distributePapers">发放试卷</option>
                            <option value="examStart">考试开始</option>
                            <option value="countdown15">15分钟提醒</option>
                            <option value="examEnd">考试结束</option>
                            <option value="postExamInstruction">考后指令</option>
                        </select>
                        <button class="btn btn-success" id="addCountBtn">添加倒计时</button>
                    </div>
                </div>

                <div class="card-title" style="font-size:15px; margin-top:4px;"><i class="fas fa-tasks"></i> 已安排任务</div>
                <div class="task-list" id="taskList">
                    <div class="empty-tip">暂无定时任务</div>
                </div>
            </div>

            <!-- 第三栏：状态与日志 -->
            <div class="card">
                <div class="card-title"><i class="fas fa-info-circle"></i> 系统状态</div>

                <div class="status-grid">
                    <div class="status-item success">
                        <div class="status-label">音频引擎</div>
                        <div class="status-value"><span class="status-dot"></span>运行正常</div>
                    </div>
                    <div class="status-item" id="playStatusItem">
                        <div class="status-label">播报状态</div>
                        <div class="status-value"><span class="status-dot off"></span>待机中</div>
                    </div>
                    <div class="status-item success">
                        <div class="status-label">唤醒锁</div>
                        <div class="status-value" id="wakeStatus"><span class="status-dot off"></span>未激活</div>
                    </div>
                    <div class="status-item danger">
                        <div class="status-label">定时任务</div>
                        <div class="status-value" id="taskCount">0 个</div>
                    </div>
                </div>

                <div class="card-title" style="font-size:15px;"><i class="fas fa-history"></i> 操作日志</div>
                <div class="log-box" id="logBox">
                    <div class="log-line"><span class="log-time">--:--:--</span>系统初始化完成</div>
                </div>
            </div>
        </div>

        <div class="footer">
            学业水平考试考务音频播报系统 · 内置标准考务指令音频 · 支持息屏后台播报
        </div>
    </div>

    <script>
        // ==================== 配置区：替换为你的音频文件名 ====================
        const audioMap = {
            entranceMusic: './audio/entrance_music.mp3',
            entranceInstruction: './audio/enter_room.mp3',
            examRules: './audio/rules.mp3',
            openAnswerSheet: './audio/open_answer.mp3',
            openExamPaper: './audio/open_paper.mp3',
            distributePapers: './audio/distribute_paper.mp3',
            examStart: './audio/exam_start.mp3',
            countdown15: './audio/remind_15min.mp3',
            examEnd: './audio/exam_end.mp3',
            postExamInstruction: './audio/recheck_paper.mp3'
        };

        const audioNameMap = {
            entranceMusic: '入场音乐',
            entranceInstruction: '进入考场指令',
            examRules: '考生守则',
            openAnswerSheet: '启封答题卡',
            openExamPaper: '启封试卷袋',
            distributePapers: '发放试卷',
            examStart: '考试开始',
            countdown15: '15分钟提醒',
            examEnd: '考试结束',
            postExamInstruction: '考后指令'
        };
        // ===================================================================

        // 全局音频实例（原生播放，兼容所有环境）
        const audioPlayer = new Audio();
        audioPlayer.preload = 'auto';
        let currentPlayingKey = null;

        // 唤醒锁
        let wakeLock = null;

        // 定时任务列表
        let taskList = [];
        let timerInterval = null;

        // DOM元素
        const dateText = document.getElementById('dateText');
        const timeText = document.getElementById('timeText');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeText = document.getElementById('volumeText');
        const stopBtn = document.getElementById('stopBtn');
        const saveBtn = document.getElementById('saveBtn');
        const logBox = document.getElementById('logBox');
        const taskListDom = document.getElementById('taskList');
        const taskCountDom = document.getElementById('taskCount');
        const countdownShow = document.getElementById('countdownShow');
        const playStatusItem = document.getElementById('playStatusItem');
        const wakeStatus = document.getElementById('wakeStatus');
        const dateInput = document.getElementById('dateInput');
        const timeInput = document.getElementById('timeInput');
        const audioSelect1 = document.getElementById('audioSelect1');
        const addTimeBtn = document.getElementById('addTimeBtn');
        const minInput = document.getElementById('minInput');
        const audioSelect2 = document.getElementById('audioSelect2');
        const addCountBtn = document.getElementById('addCountBtn');

        // 初始化
        function init() {
            // 设置默认日期
            const now = new Date();
            dateInput.value = now.toISOString().split('T')[0];

            // 加载保存的音量
            const savedVol = localStorage.getItem('exam_audio_volume');
            if (savedVol) {
                volumeSlider.value = savedVol;
                volumeText.textContent = savedVol + '%';
            }
            audioPlayer.volume = volumeSlider.value / 100;

            // 绑定按钮事件
            document.querySelectorAll('[data-audio]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const key = btn.dataset.audio;
                    playAudio(key);
                });
            });

            stopBtn.addEventListener('click', stopAudio);
            saveBtn.addEventListener('click', saveSettings);

            // 音量控制
            volumeSlider.addEventListener('input', () => {
                const vol = volumeSlider.value;
                volumeText.textContent = vol + '%';
                audioPlayer.volume = vol / 100;
            });

            // 定时按钮
            addTimeBtn.addEventListener('click', addTimeTask);
            addCountBtn.addEventListener('click', addCountdownTask);

            // 音频事件
            audioPlayer.addEventListener('ended', () => {
                addLog(`播报完成：${audioNameMap[currentPlayingKey]}`);
                updatePlayStatus(false);
                currentPlayingKey = null;
            });

            audioPlayer.addEventListener('error', () => {
                addLog(`音频加载失败，请检查文件路径：${audioNameMap[currentPlayingKey]}`);
                updatePlayStatus(false);
                currentPlayingKey = null;
            });

            // 页面可见性变化，恢复播放
            document.addEventListener('visibilitychange', async () => {
                if (!document.hidden && currentPlayingKey) {
                    try { await audioPlayer.play(); } catch (e) { }
                    await requestWakeLock();
                }
            });

            // 启动时钟
            updateClock();
            setInterval(updateClock, 1000);

            // 启动定时任务检查器
            startTaskChecker();

            addLog('考务音频播报系统启动成功');
        }

        // ========== 音频播放核心 ==========
        function playAudio(key) {
            if (!audioMap[key]) return;

            // 停止当前播放
            audioPlayer.pause();
            audioPlayer.currentTime = 0;

            // 设置新音频
            currentPlayingKey = key;
            audioPlayer.src = audioMap[key];

            audioPlayer.play().then(() => {
                addLog(`开始播报：${audioNameMap[key]}`);
                updatePlayStatus(true);
                requestWakeLock();
                updateBtnActive(key);
            }).catch(err => {
                addLog(`播放失败：${err.message}`);
                updatePlayStatus(false);
            });
        }

        function stopAudio() {
            if (!currentPlayingKey) {
                addLog('当前无正在播报的音频');
                return;
            }
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            addLog(`已停止播报：${audioNameMap[currentPlayingKey]}`);
            updatePlayStatus(false);
            currentPlayingKey = null;
            updateBtnActive(null);
        }

        function updateBtnActive(activeKey) {
            document.querySelectorAll('[data-audio]').forEach(btn => {
                btn.classList.remove('playing');
                if (btn.dataset.audio === activeKey) {
                    btn.classList.add('playing');
                }
            });
        }

        function updatePlayStatus(isPlaying) {
            const dot = playStatusItem.querySelector('.status-dot');
            const text = playStatusItem.querySelector('.status-value');
            if (isPlaying) {
                dot.classList.remove('off');
                text.innerHTML = '<span class="status-dot"></span>播报中';
            } else {
                dot.classList.add('off');
                text.innerHTML = '<span class="status-dot off"></span>待机中';
            }
        }

        // ========== 唤醒锁 ==========
        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                const dot = wakeStatus.querySelector('.status-dot');
                dot.classList.remove('off');
                wakeStatus.querySelector('.status-value').innerHTML = '<span class="status-dot"></span>已激活';
                addLog('屏幕唤醒锁已获取，息屏不中断');

                wakeLock.addEventListener('release', () => {
                    const dot = wakeStatus.querySelector('.status-dot');
                    dot.classList.add('off');
                    wakeStatus.querySelector('.status-value').innerHTML = '<span class="status-dot off"></span>未激活';
                });
            } catch (err) {
                // 静默失败，不影响播放
            }
        }

        // ========== 定时任务 ==========
        function addTimeTask() {
            const date = dateInput.value;
            const time = timeInput.value;
            const audioKey = audioSelect1.value;
            if (!date || !time) {
                addLog('请选择完整的日期和时间');
                return;
            }
            const targetTime = new Date(`${date}T${time}`).getTime();
            if (targetTime < Date.now()) {
                addLog('定时时间不能早于当前时间');
                return;
            }
            addTask(targetTime, audioKey, 'fixed');
            addLog(`已添加定时：${audioNameMap[audioKey]} ${date} ${time}`);
        }

        function addCountdownTask() {
            const mins = parseInt(minInput.value);
            const audioKey = audioSelect2.value;
            if (isNaN(mins) || mins < 1) {
                addLog('请输入有效的分钟数');
                return;
            }
            const targetTime = Date.now() + mins * 60 * 1000;
            addTask(targetTime, audioKey, 'countdown');
            addLog(`已添加倒计时：${mins}分钟后播放 ${audioNameMap[audioKey]}`);
        }

        function addTask(time, audioKey, type) {
            taskList.push({
                id: Date.now(),
                time: time,
                audioKey: audioKey,
                type: type
            });
            taskList.sort((a, b) => a.time - b.time);
            renderTaskList();
        }

        function deleteTask(id) {
            taskList = taskList.filter(t => t.id !== id);
            renderTaskList();
            addLog('已删除定时任务');
        }

        function renderTaskList() {
            taskCountDom.textContent = `${taskList.length} 个`;

            if (taskList.length === 0) {
                taskListDom.innerHTML = '<div class="empty-tip">暂无定时任务</div>';
                countdownShow.textContent = '暂无定时任务';
                return;
            }

            let html = '';
            taskList.forEach(task => {
                const date = new Date(task.time);
                const timeStr = date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
                html += `
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-time">${timeStr}</div>
                        <div class="task-name">${audioNameMap[task.audioKey]}</div>
                    </div>
                    <div class="task-del" onclick="deleteTask(${task.id})">删除</div>
                </div>
                `;
            });
            taskListDom.innerHTML = html;
        }

        function startTaskChecker() {
            timerInterval = setInterval(() => {
                const now = Date.now();

                // 检查到期任务
                for (let i = taskList.length - 1; i >= 0; i--) {
                    if (now >= taskList[i].time) {
                        playAudio(taskList[i].audioKey);
                        addLog(`定时触发：${audioNameMap[taskList[i].audioKey]}`);
                        taskList.splice(i, 1);
                        renderTaskList();
                    }
                }

                // 更新倒计时显示
                if (taskList.length > 0) {
                    const next = taskList[0];
                    const diff = Math.max(0, Math.floor((next.time - now) / 1000));
                    const h = Math.floor(diff / 3600);
                    const m = Math.floor((diff % 3600) / 60);
                    const s = diff % 60;

                    if (h > 0) {
                        countdownShow.textContent = `${h}时${m.toString().padStart(2, '0')}分${s.toString().padStart(2, '0')}秒`;
                    } else {
                        countdownShow.textContent = `${m.toString().padStart(2, '0')}分${s.toString().padStart(2, '0')}秒`;
                    }
                }
            }, 1000);
        }

        // ========== 工具函数 ==========
        function updateClock() {
            const now = new Date();
            const opt = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            dateText.textContent = now.toLocaleDateString('zh-CN', opt);
            timeText.textContent = now.toTimeString().split(' ')[0];
        }

        function addLog(msg) {
            const now = new Date();
            const t = now.toTimeString().split(' ')[0];
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="log-time">${t}</span>${msg}`;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function saveSettings() {
            localStorage.setItem('exam_audio_volume', volumeSlider.value);
            addLog('音量设置已保存到本地');
        }

        // 启动
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
